ai_usage_summary: |
  AI tools were used for architectural discussions, implementation guidance,
  debugging, documentation refinement, code review, and development support.
  The final ranking pipeline executes completely offline using precomputed
  checkpoints with zero LLM inference, zero API calls, and zero network access
  during ranking. No candidate data is transmitted during the offline ranking
  phase.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A multi-agent AI recruitment system combining semantic retrieval, structured
  LLM evaluation, deterministic score fusion, and offline reproducibility.

  1. SemanticSearcher retrieves the Top-500 candidates using FAISS.
  2. RecruiterAgent performs structured evaluation on retrieved candidates.
  3. CriticAgent performs a deeper review of the Top-100 candidates.
  4. RankingAgent combines all evaluation signals using a deterministic
     WeightedFusionStrategy.
  5. The final offline ranking pipeline loads only cached evaluation artifacts
     and generates submission outputs without network connectivity, ensuring
     reproducibility, explainability, and deterministic execution.

